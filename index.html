<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>心象風景探索レジストリ v1.5</title>
    <style>
      body {
        background: #111;
        color: #ddd;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      #game-container {
        width: 80%;
        max-width: 600px;
        padding: 20px;
        border: 1px solid #444;
        background: #222;
        border-radius: 8px;
        transition: 0.5s;
      }
      #scene-text {
        min-height: 100px;
        line-height: 1.6;
        margin-bottom: 20px;
        font-size: 1.1em;
        white-space: pre-wrap;
      }
      .status {
        font-size: 0.8em;
        color: #888;
        border-bottom: 1px solid #444;
        padding-bottom: 10px;
        margin-bottom: 15px;
      }
      .windy {
        color: #88ccff;
        font-weight: bold;
      }
      .still {
        color: #ff6666;
        font-weight: bold;
      }
      button {
        background: #333;
        color: white;
        border: 1px solid #555;
        padding: 10px 20px;
        margin: 5px;
        cursor: pointer;
        transition: 0.3s;
      }
      button:hover {
        background: #555;
        border-color: #888;
      }
      #shadow-alert {
        color: #ff0000;
        font-weight: bold;
        margin-top: 10px;
        height: 1.2em;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div class="status">
        現在地: <span id="location-name">-</span> | 環境条件:
        <span id="wind-status">-</span>
      </div>
      <div id="scene-text"></div>
      <div id="shadow-alert"></div>
      <div id="choices"></div>
    </div>

    <script>
      let worldState = {
        time: "daytime", // "daytime" か "evening"
        isSelfRecalled: false,
        mirrorClarity: "cloudy",
      };

      const registry = {
        outside: {
          name: "家の外（安全圏）",
          dayText: "昼の光が降り注いでいる。建物は静かだ。",
          eveningText:
            "赤みがかった黒い空。遠くで寺の鐘が鳴り、言い知れぬ不安が込み上げる。",
          isWindy: true,
          hasShadow: true,
          options: [
            { text: "玄関から入る", next: "entrance" },
            { text: "自分の部屋の窓を見上げる", next: "lookAtWindow" },
          ],
        },
        entrance: {
          name: "玄関",
          dayText: "たぬきの置物が静止している。",
          eveningText:
            "たぬきの置物が噛みつこうとする敵意を見せている。静寂がダブって見える。",
          isWindy: true,
          options: [
            { text: "無視して廊下へ（スルー）", next: "hallway" },
            { text: "外に出る", next: "outside" },
          ],
        },
        hallway: {
          name: "廊下",
          dayText: "光が通り抜けていくのを感じる。風通しが良い。",
          eveningText:
            "影が長く伸びている。光の通り道が、今は闇の通り道になっている。",
          isWindy: true,
          options: [
            { text: "洗面台の鏡を見る", next: "washstand" },
            { text: "キッチンを覗く", next: "kitchen" }, // ←追加
            { text: "自分の部屋に入る", next: "myRoom" },
            { text: "母の部屋に入る", next: "mothersRoom" },
            { text: "玄関へ戻る", next: "entrance" },
          ],
        },
        kitchen: {
          name: "キッチン",
          dayText:
            "祖母が静止している。家事の途中のような姿勢のまま、時間が止まっているようだ。",
          eveningText:
            "薄暗いキッチンに、祖母のシルエットが立っている。微動だにせず、ただそこに「配置」されている。",
          isWindy: true,
          options: [{ text: "廊下へ戻る", next: "hallway" }],
        },
        washstand: {
          name: "洗面台",
          dayText: "鏡はグレーに濁り、シルエットがうっすら映る程度だ。",
          eveningText:
            "鏡面はほぼ黒い。覗き込むほど、思考の深淵に引きずり込まれそうだ。",
          isWindy: true,
          options: [{ text: "鏡から目をそらす", next: "hallway" }],
        },
        myRoom: {
          name: "自分の部屋",
          dayText:
            "風が止まっている。後ろ向きでうずくまっている「自分」がいる。",
          eveningText:
            "無風の闇。モザイク状の「自分」の輪郭が、夕闇に溶けて混ざり合っている。",
          isWindy: false,
          options: [
            { text: "廊下へ戻る", next: "hallway" },
            { text: "窓を無理やりこじ開ける", next: "windExperiment" },
          ],
        },
        mothersRoom: {
          name: "母の部屋",
          dayText:
            "特異点。風が吹かない。真空パックされたような当時の空気が漂っている。\n背中を向けてうずくまっている「母」がいる。微動だにしない。",
          eveningText:
            "不快指数の極致。後ろ向きのシルエットから、かつて襲いかかってきた時の鋭い敵意が、残像のように滲み出している。",
          isWindy: false,
          options: [
            { text: "廊下へ戻る", next: "hallway" },
            { text: "ベランダの窓に近づく", next: "veranda" },
            { text: "母の背中を静かに観測する", next: "observeMother" }, // ←新しい分岐
          ],
        },
        observeMother: {
          name: "母の部屋（観測）",
          dayText:
            "どれだけ見つめても、彼女は動かない。これは「過去のデータ」の再生に過ぎないのだと確信する。",
          eveningText:
            "視線を逸らした瞬間に動き出すような錯覚。…いや、これは外部環境の「バグ」だ。自分起因ではない。",
          isWindy: false,
          options: [{ text: "思考を切り替えて部屋を出る", next: "hallway" }],
        },
        lookAtWindow: {
          name: "庭（自分の部屋の下）",
          dayText:
            "窓の中に、こちらを覗く人影がある。…あれは、小さな頃の自分だ。",
          eveningText:
            "窓の向こうに黒い人影がへばりついている。目が合った気がした。",
          isWindy: true,
          hasShadow: false,
          options: [
            { text: "玄関へ向かう", next: "entrance" },
            { text: "そのまま外へ戻る", next: "outside" },
          ],
        },
        veranda: {
          name: "母の部屋のベランダ",
          dayText: "外に繋がっているはずなのに、開放感がない。",
          eveningText:
            "ここから飛び降りても、この夕闇からは逃げられないような錯覚に陥る。",
          isWindy: false,
          options: [{ text: "部屋の中へ引き返す", next: "mothersRoom" }],
        },
        windExperiment: {
          name: "自分の部屋（実験中）",
          dayText: "…風が流れ込んできた。停滞していた空気がかき混ぜられる。",
          eveningText: "生ぬるい風が吹き込む。夕闇が部屋の中へ侵食してくる。",
          isWindy: true,
          options: [
            { text: "窓を閉める", next: "myRoom" },
            { text: "開けたまま廊下へ出る", next: "hallway" },
          ],
        },
      };

      let currentId = "outside";

      function toggleTime() {
        worldState.time = worldState.time === "daytime" ? "evening" : "daytime";
        updateScene(currentId);
      }

      function updateScene(id) {
        currentId = id;
        const scene = registry[id];
        if (!scene) return;

        // 画面全体の色変え
        const container = document.getElementById("game-container");
        const body = document.body;

        if (worldState.time === "evening") {
          body.style.background = "#2a0a0a"; // どす黒い赤
          container.style.background = "#1a0505";
          document.getElementById("scene-text").innerText =
            scene.eveningText + "\n\n（遠くで寺の鐘が鳴っている：ゴーン……）";
        } else {
          body.style.background = "#111";
          container.style.background = "#222";
          document.getElementById("scene-text").innerText = scene.dayText;
        }

        // 基本情報の更新
        document.getElementById("location-name").innerText =
          scene.name + (worldState.time === "evening" ? "（夕方）" : "（昼）");

        // 風の状態
        const windSpan = document.getElementById("wind-status");
        windSpan.innerText = scene.isWindy ? "風通し良好" : "無風（隔離）";
        windSpan.className = scene.isWindy ? "windy" : "still";

        // 人影の観測ロジック
        const alert = document.getElementById("shadow-alert");
        alert.innerText =
          scene.hasShadow && worldState.time === "evening"
            ? "！ 窓にへばりつく影が、こちらを凝視している。"
            : scene.hasShadow
              ? "！ 窓からこちらを覗く人影がある。"
              : "";

        // 選択肢の生成
        const choiceContainer = document.getElementById("choices");
        choiceContainer.innerHTML = "";

        // 時間切替ボタン（常に表示）
        const timeBtn = document.createElement("button");
        timeBtn.innerText =
          worldState.time === "daytime" ? "▷ 夕方へ変異させる" : "▷ 昼間に戻す";
        timeBtn.style.background =
          worldState.time === "daytime" ? "#4a2a2a" : "#2a4a4a";
        timeBtn.onclick = toggleTime;
        choiceContainer.appendChild(timeBtn);

        scene.options.forEach((opt) => {
          const btn = document.createElement("button");
          btn.innerText = opt.text;
          btn.onclick = () => updateScene(opt.next);
          choiceContainer.appendChild(btn);
        });

        // 固有演出（ベランダ等の色変え）
        // updateScene関数内の演出部分（if文のところ）に追加
        // updateScene関数内の演出部分（if文）を更新
        if (
          id === "veranda" ||
          id === "mothersRoom" ||
          id === "observeMother"
        ) {
          container.style.borderColor = "#ff4444"; // 警告の赤
          container.style.boxShadow = "0 0 25px rgba(255, 0, 0, 0.3)";
        } else if (id === "windExperiment") {
          container.style.borderColor = "#88ccff";
        } else if (id === "kitchen") {
          container.style.borderColor = "#aaaaaa";
        } else {
          container.style.borderColor = "#444";
          container.style.boxShadow = "none";
        }
      }

      // 初期起動
      updateScene("outside");
    </script>
  </body>
</html>
