<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>心象風景探索レジストリ v1.5</title>
    <style>
      body {
        background: #111;
        color: #ddd;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      #game-container {
        width: 80%;
        max-width: 600px;
        padding: 20px;
        border: 1px solid #444;
        background: #222;
        border-radius: 8px;
        transition: 0.5s;
      }
      #scene-text {
        min-height: 100px;
        line-height: 1.6;
        margin-bottom: 20px;
        font-size: 1.1em;
        white-space: pre-wrap;
      }
      .status {
        font-size: 0.8em;
        color: #888;
        border-bottom: 1px solid #444;
        padding-bottom: 10px;
        margin-bottom: 15px;
      }
      .windy {
        color: #88ccff;
        font-weight: bold;
      }
      .still {
        color: #ff6666;
        font-weight: bold;
      }
      button {
        background: #333;
        color: white;
        border: 1px solid #555;
        padding: 10px 20px;
        margin: 5px;
        cursor: pointer;
        transition: 0.3s;
      }
      button:hover {
        background: #555;
        border-color: #888;
      }
      #shadow-alert {
        color: #ff0000;
        font-weight: bold;
        margin-top: 10px;
        height: 1.2em;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div class="status">
        現在地: <span id="location-name">-</span> | 環境条件:
        <span id="wind-status">-</span>
      </div>
      <div id="scene-text"></div>
      <div id="shadow-alert"></div>
      <div id="choices"></div>
      <hr style="border: 0; border-top: 1px dashed #444; margin: 20px 0" />
      <div style="font-size: 0.8em; color: #666; margin-bottom: 5px">
        Observation Log:
      </div>
      <div
        id="log-container"
        style="
          height: 100px;
          overflow-y: auto;
          font-size: 0.85em;
          color: #aaa;
          background: #1a1a1a;
          padding: 10px;
          border-radius: 4px;
        "
      >
        <div>観測を開始しました...</div>
      </div>
      <div id="choices"></div>
    </div>

    <script>
      let worldState = {
        time: "daytime",
        isSelfRecalled: false,
        mirrorClarity: "cloudy",
        isTanukiFixed: false, // ←追加：たぬきが修正されたか
      };

      const registry = {
        outside: {
          name: "家の外（敷地内）",
          dayText: "昼の光が降り注いでいる。建物は静かだ。",
          eveningText:
            "赤みがかった黒い空。遠くで寺の鐘が鳴り、不安が込み上げる。",
          isWindy: true,
          hasShadow: true,
          options: [
            { text: "玄関から入る", next: "entrance" },
            { text: "自分の部屋の窓を見上げる", next: "lookAtWindow" },
            { text: "敷地外の道路（安全圏）へ出る", next: "safeRoad" },
          ],
        },
        safeRoad: {
          name: "敷地外の道路",
          text: "実家から数メートル離れたアスファルト。ここは安全圏だ。どんな敵も、この境界線を越えて追ってくることはできない。",
          isWindy: true,
          options: [{ text: "家を振り返る", next: "outside" }],
        },
        entrance: {
          name: "玄関",
          updateText: () => {
            if (worldState.isTanukiFixed) {
              return "たぬきの置物が鎮座している。かつての敵意は消え、今はただの古い焼き物としてそこに『固定』されている。";
            }
            return worldState.time === "daytime"
              ? "たぬきの置物が静止している。"
              : "たぬきの置物が噛みつこうとする敵意を見せている。静寂と攻撃性がダブって見えるバグ状態だ。";
          },
          isWindy: true,
          options: [
            { text: "無視して廊下へ（スルー）", next: "hallway" },
            { text: "たぬきをじっくり観測する", next: "tanukiObservation" },
            { text: "外に出る", next: "outside" },
          ],
        },
        tanukiObservation: {
          name: "玄関（デバッグ中）",
          text: "置物の細部をドライに観察する。これは過去の嫌な記憶がバグとして再生されているだけだ。実害はない「不変のバグ」だと確信する。",
          isWindy: true,
          options: [
            {
              text: "「ただの置物」だと納得する",
              next: "entrance",
              action: () => {
                worldState.isTanukiFixed = true;
              },
            },
          ],
        },
        hallway: {
          name: "廊下",
          dayText: "光が通り抜けていくのを感じる。風通しが良い。",
          eveningText:
            "影が長く伸びている。光の通り道が、今は闇の通り道になっている。",
          isWindy: true,
          options: [
            { text: "洗面台の鏡を見る", next: "washstand" },
            { text: "キッチンを覗く", next: "kitchen" },
            { text: "自分の部屋に入る", next: "myRoom" },
            { text: "母の部屋に入る", next: "mothersRoom" },
            { text: "玄関へ戻る", next: "entrance" },
          ],
        },
        kitchen: {
          name: "キッチン",
          dayText:
            "祖母が静止している。家事の途中のまま、時間が止まっているようだ。",
          eveningText:
            "薄暗いキッチンに、祖母のシルエットが立っている。ただそこに「配置」されている。",
          isWindy: true,
          options: [{ text: "廊下へ戻る", next: "hallway" }],
        },
        washstand: {
          name: "洗面台",
          dayText: "鏡はグレーに濁り、シルエットがうっすら映る程度だ。",
          eveningText:
            "鏡面はほぼ黒い。覗き込むほど、思考の深淵に引きずり込まれそうだ。",
          isWindy: true,
          options: [{ text: "鏡から目をそらす", next: "hallway" }],
        },
        myRoom: {
          name: "自分の部屋",
          updateText: () => {
            return worldState.time === "daytime"
              ? "後ろ向きで座る「小さな自分」がいる。顔にはデジタル・スクエア状のモザイクがかかっている。"
              : "闇の中、後ろ向きの輪郭が夕闇に溶けている。ここには風が吹かない。";
          },
          isWindy: false,
          options: [
            { text: "廊下へ戻る", next: "hallway" },
            { text: "窓・カーテン・鍵を全開にする", next: "experimentResult" },
            { text: "モザイクの質感を観測する", next: "mosaicDetail" },
          ],
        },
        experimentResult: {
          name: "自分の部屋（干渉実験）",
          text: "窓を全開にしても、やはり風は吹かない。背後に強烈な圧力を感じて振り返ると、至近距離でこちらを覗き込む『小さな自分』の残像がある。\n…彼は再び、後ろ向きの安定状態へと戻った。",
          isWindy: false,
          options: [
            { text: "今の状態を「安心」として受容する", next: "myRoom" },
          ],
        },
        mosaicDetail: {
          name: "自分の部屋（詳細観測）",
          text: "モザイクは複雑に明滅している。これは自己防衛プロトコル。何か（自分自身の核）を守るための、不可侵の領域であることを示している。",
          isWindy: false,
          options: [{ text: "距離を保って離れる", next: "myRoom" }],
        },
        mothersRoom: {
          name: "母の部屋",
          dayText:
            "特異点。真空パックされたような当時の空気が漂っている。背中を向けてうずくまっている「母」がいる。",
          eveningText:
            "不快指数の極致。後ろ向きのシルエットから、かつての敵意が残像のように滲み出している。",
          isWindy: false,
          options: [
            { text: "廊下へ戻る", next: "hallway" },
            { text: "ベランダの窓に近づく", next: "veranda" },
            { text: "母の背中を静かに観測する", next: "observeMother" },
          ],
        },
        observeMother: {
          name: "母の部屋（観測）",
          dayText:
            "どれだけ見つめても、彼女は動かない。これは「過去のデータ」の再生に過ぎないと確信する。",
          eveningText:
            "視線を逸らした瞬間に動き出すような錯覚。…いや、これは外部環境の「バグ」だ。自分起因ではない。",
          isWindy: false,
          options: [{ text: "思考を切り替えて部屋を出る", next: "hallway" }],
        },
        veranda: {
          name: "母の部屋のベランダ",
          text: "強い不快感が漂う場所。ここから瓦屋根を伝って道路へと脱出した記憶がある。あの時、敵は屋根から先へは追ってこれなかった。",
          isWindy: false,
          options: [
            { text: "脱出ルート（瓦屋根）を視認する", next: "roofView" },
            { text: "部屋の中へ引き返す", next: "mothersRoom" },
          ],
        },
        roofView: {
          name: "ベランダからの視界",
          text: "瓦屋根が道路へと続いている。物理法則とは無関係な不快感はあるが、脱出経路としての機能は今も生きている。",
          isWindy: false,
          options: [{ text: "ベランダへ戻る", next: "veranda" }],
        },
        lookAtWindow: {
          name: "庭（自分の部屋の下）",
          dayText:
            "窓の中に、こちらを覗く人影がある。…あれは、小さな頃の自分だ。",
          eveningText:
            "窓の向こうに黒い人影がへばりついている。目が合った気がした。",
          isWindy: true,
          hasShadow: false,
          options: [
            { text: "玄関へ向かう", next: "entrance" },
            { text: "そのまま外へ戻る", next: "outside" },
          ],
        },
      };
      let currentId = "outside";

      function toggleTime() {
        worldState.time = worldState.time === "daytime" ? "evening" : "daytime";
        updateScene(currentId);
      }

      function addLog(text) {
        const logContainer = document.getElementById("log-container");
        const newEntry = document.createElement("div");
        newEntry.innerText = `[${new Date().toLocaleTimeString()}] ${text}`;
        logContainer.prepend(newEntry); // 新しいログを上に
      }

      function updateScene(id) {
        currentId = id;
        const scene = registry[id];

        // シーンに入ったときにログを出す
        addLog(`${scene.name} に到達。環境をスキャン中...`);

        if (!scene) return;

        // --- ここを修正：優先順位をつけてテキストを取得 ---
        let displayText = "";
        if (scene.updateText) {
          displayText = scene.updateText(); // ① 動的な更新関数があれば実行
        } else if (worldState.time === "evening" && scene.eveningText) {
          displayText = scene.eveningText; // ② 夕方で夕方用テキストがあれば採用
        } else if (worldState.time === "daytime" && scene.dayText) {
          displayText = scene.dayText; // ③ 昼で昼用テキストがあれば採用
        } else {
          displayText = scene.text || ""; // ④ どれもなければ共通の text を採用
        }
        // --- 修正ここまで ---

        // (以下、背景色やボタン生成のコードはそのまま)

        // 画面全体の色変え
        const container = document.getElementById("game-container");
        const body = document.body;

        if (worldState.time === "evening") {
          body.style.background = "#2a0a0a";
          container.style.background = "#1a0505";
          document.getElementById("scene-text").innerText =
            displayText +
            (id !== "tanukiObservation" ? "\n\n（ゴーン……）" : "");
        } else {
          body.style.background = "#111";
          container.style.background = "#222";
          document.getElementById("scene-text").innerText = displayText;
        }

        // 基本情報の更新
        document.getElementById("location-name").innerText =
          scene.name + (worldState.time === "evening" ? "（夕方）" : "（昼）");

        // 風の状態
        const windSpan = document.getElementById("wind-status");
        windSpan.innerText = scene.isWindy ? "風通し良好" : "無風（隔離）";
        windSpan.className = scene.isWindy ? "windy" : "still";

        // 人影の観測ロジック
        const alert = document.getElementById("shadow-alert");
        alert.innerText =
          scene.hasShadow && worldState.time === "evening"
            ? "！ 窓にへばりつく影が、こちらを凝視している。"
            : scene.hasShadow
              ? "！ 窓からこちらを覗く人影がある。"
              : "";

        // 選択肢の生成
        // ※ action を実行するコードをボタン生成の部分に足します
        const choiceContainer = document.getElementById("choices");
        choiceContainer.innerHTML = "";

        // 時間切替ボタン
        const timeBtn = document.createElement("button");
        timeBtn.innerText =
          worldState.time === "daytime" ? "▷ 夕方へ変異させる" : "▷ 昼間に戻す";
        timeBtn.onclick = toggleTime;
        choiceContainer.appendChild(timeBtn);

        scene.options.forEach((opt) => {
          const btn = document.createElement("button");
          btn.innerText = opt.text;
          btn.onclick = () => {
            if (opt.action) opt.action();
            addLog(`アクション: ${opt.text}`); // アクションをログに記録
            updateScene(opt.next);
          };
          choiceContainer.appendChild(btn);
        });

        // （以下、色の演出コードなど）

        // updateScene関数内の演出部分（if文のところ）に追加
        // updateScene関数内の演出部分（if文）を更新
        if (
          id === "veranda" ||
          id === "mothersRoom" ||
          id === "observeMother"
        ) {
          container.style.borderColor = "#ff4444"; // 警告の赤
          container.style.boxShadow = "0 0 25px rgba(255, 0, 0, 0.3)";
        } else if (id === "windExperiment") {
          container.style.borderColor = "#88ccff";
        } else if (id === "kitchen") {
          container.style.borderColor = "#aaaaaa";
        } else {
          container.style.borderColor = "#444";
          container.style.boxShadow = "none";
        }
      }

      // 初期起動
      updateScene("outside");
    </script>
  </body>
</html>
