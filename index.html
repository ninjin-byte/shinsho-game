<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>心象風景探索：マスターレジストリ v2.1 攻略版</title>
    <style>
      body {
        background: #111;
        color: #ddd;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
      }
      #game-container {
        width: 85%;
        max-width: 650px;
        padding: 25px;
        border: 1px solid #444;
        background: #222;
        border-radius: 12px;
        transition: 0.5s;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }
      #scene-text {
        min-height: 120px;
        line-height: 1.7;
        margin-bottom: 20px;
        font-size: 1.05em;
        white-space: pre-wrap;
      }
      .status {
        font-size: 0.85em;
        color: #888;
        border-bottom: 1px solid #444;
        padding-bottom: 12px;
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
      }
      button {
        background: #353535;
        color: #eee;
        border: 1px solid #555;
        padding: 12px 18px;
        margin: 6px;
        cursor: pointer;
        border-radius: 4px;
        transition: 0.2s;
        font-size: 0.9em;
      }
      button:hover {
        background: #555;
        border-color: #999;
        transform: translateY(-1px);
      }
      #log-container {
        height: 120px;
        overflow-y: auto;
        font-size: 0.8em;
        color: #888;
        background: #151515;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #333;
        margin-top: 15px;
      }
      .log-entry {
        margin-bottom: 4px;
        border-left: 2px solid #444;
        padding-left: 8px;
      }
      .windy {
        color: #88ccff;
      }
      .still {
        color: #ff6666;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div class="status">
        <span>📍 <span id="location-name">-</span></span>
        <span>🌬️ <span id="wind-status">-</span></span>
      </div>
      <div id="scene-text"></div>
      <div id="choices"></div>
      <div id="log-container"></div>
    </div>

    <script>
      let worldState = {
        time: "daytime",
        isTanukiFixed: false,
        hasSeenEscapeRoute: false,
        observedEntities: new Set(), // 観測したエンティティを記録
        totalEntities: 4, // たぬき、祖母、母、自分
      };

      const registry = {
        outside: {
          name: "家の外（敷地内）",
          dayText: "昼の光。建物は静かだ。",
          eveningText: "赤黒い空。寺の鐘が鳴り、不安が込み上げる。",
          isWindy: true,
          getOptions: () => {
            let opts = [
              { text: "玄関から入る", next: "entrance" },
              { text: "自分の部屋の窓を見上げる", next: "lookAtWindow" },
            ];
            if (worldState.hasSeenEscapeRoute) {
              opts.push({
                text: "敷地外の道路（安全圏）へ脱出する",
                next: "safeRoad",
              });
            }
            return opts;
          },
        },
        safeRoad: {
          name: "敷地外の道路",
          text: "実家から離れたアスファルト。ここは完全な安全圏だ。どんな敵も境界線を越えては来られない。",
          isWindy: true,
          getOptions: () => [{ text: "敷地内へ戻る", next: "outside" }],
        },
        entrance: {
          name: "玄関",
          updateText: () =>
            worldState.isTanukiFixed
              ? "たぬきは「ただの置物」として固定されている。"
              : worldState.time === "daytime"
                ? "たぬきが静止している。"
                : "たぬきの敵意がバグのようにダブって見える。",
          isWindy: true,
          getOptions: () => [
            { text: "廊下へ進む", next: "hallway" },
            { text: "たぬきをじっくり観測する", next: "tanukiObservation" },
            { text: "外に出る", next: "outside" },
          ],
        },
        tanukiObservation: {
          name: "玄関（観測）",
          text: "これは過去の記憶が再生されているだけのバグだ。実害はないと確信する。",
          isWindy: true,
          getOptions: () => [
            {
              text: "「ただの置物」だと納得する",
              next: "entrance",
              action: () => {
                worldState.isTanukiFixed = true;
                markObserved("たぬき");
              },
            },
          ],
        },
        hallway: {
          name: "廊下",
          dayText: "光が通り抜け、風通しが良い。",
          eveningText: "影が長く伸び、闇の通り道になっている。",
          isWindy: true,
          getOptions: () => [
            { text: "洗面台の鏡を見る", next: "washstand" },
            { text: "キッチンを覗く", next: "kitchen" },
            { text: "自分の部屋に入る", next: "myRoom" },
            { text: "母の部屋に入る", next: "mothersRoom" },
            { text: "玄関へ戻る", next: "entrance" },
          ],
        },
        kitchen: {
          name: "キッチン",
          text: "祖母が家事の途中のままフリーズしている。時間が止まった背景オブジェクトだ。",
          isWindy: true,
          getOptions: () => [
            {
              text: "廊下へ戻る",
              next: "hallway",
              action: () => markObserved("祖母"),
            },
          ],
        },
        washstand: {
          name: "洗面台",
          dayText:
            "鏡はグレーに濁り、シルエットがうっすら映る。見づらさが安心材料だ。",
          eveningText: "鏡面はほぼ黒い。深淵を覗くような感覚。",
          isWindy: true,
          getOptions: () => [{ text: "鏡から目をそらす", next: "hallway" }],
        },
        myRoom: {
          name: "自分の部屋",
          updateText: () =>
            "後ろ向きで座る「小さな自分」がいる。顔にはモザイク。ここは風が吹かない。",
          isWindy: false,
          getOptions: () => [
            { text: "廊下へ戻る", next: "hallway" },
            {
              text: "窓・カーテンを全開にする（実験）",
              next: "experimentResult",
            },
            { text: "モザイクを詳細観測する", next: "mosaicDetail" },
          ],
        },
        experimentResult: {
          name: "自分の部屋（実験）",
          text: "全開にしても風は吹かない。背後に圧力を感じ振り返ると、至近距離で覗き込む残像。…彼は再び後ろ向きに戻った。",
          isWindy: false,
          getOptions: () => [
            { text: "この安定を「安心」として受容する", next: "myRoom" },
          ],
        },
        mosaicDetail: {
          name: "自分の部屋（詳細）",
          text: "複雑に明滅するモザイク。核を守る「自己防衛プロトコル」そのものだ。",
          isWindy: false,
          getOptions: () => [
            {
              text: "離れる",
              next: "myRoom",
              action: () => markObserved("小さな自分"),
            },
          ],
        },
        mothersRoom: {
          name: "母の部屋",
          dayText: "特異点。無風。背中を向けてうずくまる母がいる。",
          eveningText: "不快指数の極致。かつての敵意が残像のように滲む。",
          isWindy: false,
          getOptions: () => [
            { text: "廊下へ戻る", next: "hallway" },
            { text: "ベランダに近づく", next: "veranda" },
            { text: "母の背中を観測する", next: "observeMother" },
          ],
        },
        observeMother: {
          name: "母の部屋（観測）",
          text: "彼女は動かない。これは過去データの再生に過ぎないバグだ。",
          isWindy: false,
          getOptions: () => [
            {
              text: "部屋を出る",
              next: "hallway",
              action: () => markObserved("母"),
            },
          ],
        },
        veranda: {
          name: "母の部屋のベランダ",
          text: "強い不快感。ここから瓦屋根を伝って脱出した記憶がある。",
          isWindy: false,
          getOptions: () => [
            { text: "脱出ルート（瓦屋根）を視認する", next: "roofView" },
            { text: "部屋へ引き返す", next: "mothersRoom" },
          ],
        },
        roofView: {
          name: "ベランダ（脱出路）",
          text: "瓦屋根が道路へ続く。ここは敵が追ってこれない「確かな事実」だ。",
          isWindy: false,
          getOptions: () => [
            {
              text: "納得して戻る",
              next: "veranda",
              action: () => {
                if (!worldState.hasSeenEscapeRoute) {
                  worldState.hasSeenEscapeRoute = true;
                  addLog(
                    "🔑 攻略情報：脱出ルートを確定。道路へのアクセスが解禁されました。",
                  );
                }
              },
            },
          ],
        },
        lookAtWindow: {
          name: "庭（窓の下）",
          text: "窓から「小さな自分」がこちらを見つめ返してくる。視線が同期している。",
          isWindy: true,
          getOptions: () => [{ text: "戻る", next: "outside" }],
        },
      };

      function addLog(msg) {
        const log = document.getElementById("log-container");
        const entry = document.createElement("div");
        entry.className = "log-entry";
        entry.innerText = `> ${msg}`;
        log.prepend(entry);
      }

      function markObserved(name) {
        if (!worldState.observedEntities.has(name)) {
          worldState.observedEntities.add(name);
          addLog(
            `✅ 観測完了: ${name} (${worldState.observedEntities.size}/${worldState.totalEntities})`,
          );
          if (worldState.observedEntities.size === worldState.totalEntities) {
            addLog("🎊 全システムの構造把握を完了。外部化に成功しました。");
          }
        }
      }

      function updateScene(id) {
        const scene = registry[id];
        if (!scene) return;

        let text = scene.updateText
          ? scene.updateText()
          : worldState.time === "evening"
            ? scene.eveningText || scene.text
            : scene.dayText || scene.text;
        document.getElementById("scene-text").innerText = text;
        document.getElementById("location-name").innerText =
          scene.name + (worldState.time === "evening" ? " (夕方)" : " (昼)");

        const wind = document.getElementById("wind-status");
        wind.innerText = scene.isWindy ? "風通し良好" : "無風（隔離）";
        wind.className = scene.isWindy ? "windy" : "still";

        const container = document.getElementById("game-container");
        container.style.borderColor =
          id.includes("mothersRoom") || id.includes("veranda")
            ? "#ff4444"
            : "#444";
        document.body.style.background =
          worldState.time === "evening" ? "#2a0a0a" : "#111";

        const choiceContainer = document.getElementById("choices");
        choiceContainer.innerHTML = "";

        // 時間変更ボタン
        const timeBtn = document.createElement("button");
        timeBtn.innerText =
          worldState.time === "daytime" ? "▷ 夕方へ変異" : "▷ 昼に戻す";
        timeBtn.onclick = () => {
          worldState.time =
            worldState.time === "daytime" ? "evening" : "daytime";
          addLog(`環境変異: ${worldState.time}`);
          updateScene(id);
        };
        choiceContainer.appendChild(timeBtn);

        // 各種選択肢
        const options = scene.getOptions();
        options.forEach((opt) => {
          const btn = document.createElement("button");
          btn.innerText = opt.text;
          btn.onclick = () => {
            if (opt.action) opt.action();
            updateScene(opt.next);
          };
          choiceContainer.appendChild(btn);
        });
      }

      addLog("心象風景レジストリ v2.1 起動...");
      updateScene("outside");
    </script>
  </body>
</html>
