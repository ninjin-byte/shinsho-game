<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>心象風景探索レジストリ v1.0</title>
    <style>
      body {
        background: #111;
        color: #ddd;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      #game-container {
        width: 80%;
        max-width: 600px;
        padding: 20px;
        border: 1px solid #444;
        background: #222;
        border-radius: 8px;
      }
      #scene-text {
        min-height: 100px;
        line-height: 1.6;
        margin-bottom: 20px;
        font-size: 1.1em;
      }
      .status {
        font-size: 0.8em;
        color: #888;
        border-bottom: 1px solid #444;
        padding-bottom: 10px;
        margin-bottom: 15px;
      }
      .windy {
        color: #88ccff;
        font-weight: bold;
      }
      .still {
        color: #ff6666;
        font-weight: bold;
      }
      button {
        background: #333;
        color: white;
        border: 1px solid #555;
        padding: 10px 20px;
        margin: 5px;
        cursor: pointer;
        transition: 0.3s;
      }
      button:hover {
        background: #555;
        border-color: #888;
      }
      #shadow-alert {
        color: #ff0000;
        font-weight: bold;
        margin-top: 10px;
        height: 1.2em;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div class="status">
        現在地: <span id="location-name">-</span> | 環境条件:
        <span id="wind-status">-</span>
      </div>
      <div id="scene-text"></div>
      <div id="shadow-alert"></div>
      <div id="choices"></div>
    </div>

    <script>
      // レジストリ定義
      const registry = {
        outside: {
          name: "家の外",
          text: "建物を外から眺めている。昼の光が降り注いでいる。",
          isWindy: true,
          hasShadow: true,
          options: [
            { text: "家の中に入る", next: "hallway" },
            { text: "自分の部屋の窓を見上げる", next: "lookAtWindow" }, // ←追加
          ],
        },
        hallway: {
          name: "廊下",
          text: "全体的に風通しが良い。光が通り抜けていくのを感じる。",
          isWindy: true,
          hasShadow: false,
          options: [
            { text: "自分の部屋に入る", next: "myRoom" },
            { text: "母の部屋に入る", next: "mothersRoom" },
            { text: "外に出る", next: "outside" },
          ],
        },
        myRoom: {
          name: "自分の部屋",
          text: "風が止まっている。真空パックされた記憶の部屋。",
          isWindy: false,
          options: [
            { text: "廊下へ戻る", next: "hallway" },
            { text: "窓を無理やりこじ開ける", next: "windExperiment" }, // ←実験開始！
          ],
        },
        mothersRoom: {
          name: "母の部屋",
          text: "特異点。風が吹かない。真空パックされたような、当時の空気が漂っている。",
          isWindy: false,
          hasShadow: false,
          options: [
            { text: "廊下へ戻る", next: "hallway" },
            { text: "ベランダの窓に近づく", next: "veranda" }, // ←追加
          ],
        },
        lookAtWindow: {
          name: "庭（自分の部屋の下）",
          text: "窓の中に、こちらを覗く人影がある。…あれは、小さな頃の自分だ。家の中にいる時はあんなにうずくまっていたのに。",
          isWindy: true,
          hasShadow: false,
          options: [
            { text: "目をそらして玄関へ向かう", next: "hallway" },
            { text: "そのまま外へ逃げる", next: "outside" },
          ],
        },
        veranda: {
          name: "母の部屋のベランダ",
          text: "外に繋がっているはずなのに、開放感がない。物理的な風通しとは無関係な、固有の不快指数がここには設定されているようだ。…長く居るべきではない。",
          isWindy: false,
          hasShadow: false,
          options: [{ text: "部屋の中へ引き返す", next: "mothersRoom" }],
        },
        windExperiment: {
          name: "自分の部屋（実験中）",
          text: "…風が流れ込んできた。停滞していた空気がかき混ぜられ、『うずくまっていた自分』の形が少し崩れた気がする。",
          isWindy: true, // ここで風が吹く！
          options: [
            { text: "窓を閉める", next: "myRoom" },
            { text: "開けたまま廊下へ出る", next: "hallway" },
          ],
        },
      };

      function updateScene(id) {
        const scene = registry[id];

        // テキスト更新
        document.getElementById("location-name").innerText = scene.name;
        document.getElementById("scene-text").innerText = scene.text;

        // 風の状態
        const windSpan = document.getElementById("wind-status");
        windSpan.innerText = scene.isWindy ? "風通し良好" : "無風（隔離）";
        windSpan.className = scene.isWindy ? "windy" : "still";

        // 人影の観測ロジック
        const alert = document.getElementById("shadow-alert");
        alert.innerText = scene.hasShadow
          ? "！ 窓からこちらを覗く人影がある。"
          : "";

        // 選択肢の生成
        const choiceContainer = document.getElementById("choices");
        choiceContainer.innerHTML = "";
        scene.options.forEach((opt) => {
          const btn = document.createElement("button");
          btn.innerText = opt.text;
          btn.onclick = () => updateScene(opt.next);
          choiceContainer.appendChild(btn);
        });
        // さっきの色のコードをこう書き換えます
        const container = document.getElementById("game-container");
        if (id === "veranda") {
          container.style.borderColor = "#ff4444";
          container.style.boxShadow = "0 0 20px rgba(255, 0, 0, 0.2)";
        } else if (id === "windExperiment") {
          container.style.borderColor = "#88ccff"; // 風の青
          container.style.boxShadow = "0 0 20px rgba(136, 204, 255, 0.4)"; // 風のゆらぎ
        } else {
          container.style.borderColor = "#444";
          container.style.boxShadow = "none";
        }
      }

      // 初期起動
      updateScene("outside");
    </script>
  </body>
</html>
